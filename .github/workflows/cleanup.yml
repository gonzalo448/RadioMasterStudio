name: Git Cleanup

on:
  schedule:
    - cron: '0 3 * * 0'   # Cada domingo a las 3 AM UTC
  workflow_dispatch:       # Permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Git Garbage Collection
        run: |
          git gc --prune=now
          git repack -ad
          git verify-pack -v .git/objects/pack/*.idx
